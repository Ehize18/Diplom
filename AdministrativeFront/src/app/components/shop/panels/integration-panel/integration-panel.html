<div class="panel integration-panel">
    <div class="panel-content-wrap">
        <div class="panel-header">
            <div class="panel-title">
                <img class="img24" [src]="getImageSrc()">
                <p class="accent-font">{{ getTitle() }}</p>
            </div>
        </div>
        <div class="panel-content">
            {{ url() }}
        </div>
        <app-button caption="Настройки"
            [onClickCallback]="onSettingsButtonClick.bind(this)"
            ></app-button>
    </div>
</div>
<div class="integration-popup">
     @if (isModalOpened()) {
        <app-popup [config]="getPopupConfig()"></app-popup>
    }
</div>
