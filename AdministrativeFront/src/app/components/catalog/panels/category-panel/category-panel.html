<div class="panel">
    <div class="upload-container">
        <div class="preview">
                <img class="preview-image" [src]="imageSrc()">
            </div>
        <input
            type="file"
            (change)="onImageChanged($event)"
            accept="image/*"
            >
    </div>
    <div class="input-with-caption">
        <p>
            Название категории
        </p>
        <div class="input-wrapper">
            <input type="text" [(ngModel)]="title">
        </div>
    </div>
    <app-lookup
        caption="Родительская категория"
        id="parent-category"
        [values]="getLookupData()"
        [defaultValue]="getDefaultLookupData()"
        (itemSelected)="parentCategoryChanged($event)">
    </app-lookup>
    <div class="checkbox-with-caption">
        <p>
            Активно
        </p>
        <div class="checkbox-wrapper">
            <input type="checkbox" [(ngModel)]="isActive">
        </div>
    </div>
    <div class="buttons">
        <app-button caption="Сохранить" [onClickCallback]="onSaveButtonClick.bind(this)"></app-button>
        @if (selectedCategory()) {
            <app-button caption="Удалить" [onClickCallback]="onDeleteButtonClick.bind(this)"></app-button>
        }
    </div>
</div>
