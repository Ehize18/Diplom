<div class="basket-wrap">
    <div class="basket-content">
        @for (item of basketItems(); track item.basketItemId) {
            <div class="basket-item-wrap">
                <div class="basket-item-img">
                    <img [src]="getImageSrc(item)">
                </div>
                <div class="basket-item-title">
                    <p>{{item.title}}</p>
                </div>
                <div class="basket-item-controls">
                    <div class="basket-item-count">
                        <input type="number"
                            min="1" step="1"
                            [max]="item.availableCount"
                            [(ngModel)]="item.count"
                            (focusout)="onBasketItemCountChange(item.basketItemId)">
                        <p>Доступно: {{item.availableCount}}</p>
                    </div>
                    <div class="basket-item-delete-button"
                        (click)="onDeleteBasketItemClick(item.basketItemId)">
                        <img src="trash.png">
                    </div>
                </div>
            </div>
        }
        @if (basketItems().length === 0) {
            <p>
                Здесь ничего нет, за покупками!
            </p>
        }
    </div>
</div>
@if (basketItems().length > 0) {
    <div class="confirm-order accent-font" (click)="onConfirmOrderButtonClick()">
        <p>Оформить заказ</p>
    </div>
}
